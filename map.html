<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>BookZzz — Carte des hôtels</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,300;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<!-- Leaflet.js — free OpenStreetMap -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#060e1a;--bg2:#091628;--bg3:#0d2040;
  --azure:#5DADE2;--azure2:#85C1E9;--blue:#1a7fd4;
  --white:#f0f7ff;--glass:rgba(13,32,64,0.85);--glass2:rgba(6,14,26,0.92);
  --border:rgba(93,173,226,0.2);--border2:rgba(26,127,212,0.3);
  --text:#e8f4fd;--dim:rgba(220,240,255,0.52);
  --green:#2ecc71;--r:14px;--r2:20px;--r3:28px;
}
html,body{width:100%;height:100%;font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);overflow:hidden;}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:1000;display:flex;align-items:center;gap:12px;padding:clamp(12px,2vw,15px) clamp(14px,4vw,22px);background:rgba(6,14,26,0.95);border-bottom:1px solid var(--border);backdrop-filter:blur(28px);}
.back-btn{display:flex;align-items:center;gap:7px;padding:8px clamp(12px,3vw,18px);background:rgba(13,32,64,.5);border:1px solid var(--border);border-radius:40px;color:var(--azure);font-size:clamp(12px,3vw,13px);font-weight:600;cursor:pointer;transition:all .3s;}
.back-btn:hover{background:rgba(93,173,226,.1);}
.topbar-logo{font-family:'Cormorant Garamond',serif;font-size:clamp(20px,5vw,24px);font-weight:700;color:var(--white);}
.topbar-logo span{color:var(--azure);font-style:italic;}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.hotel-count{font-size:12px;color:var(--dim);background:rgba(13,32,64,.5);border:1px solid var(--border);border-radius:40px;padding:6px 14px;}
.hotel-count strong{color:var(--azure);}

/* FILTER BAR */
.filterbar{position:fixed;top:clamp(54px,9vw,66px);left:0;right:0;z-index:999;padding:10px clamp(14px,4vw,22px);background:rgba(6,14,26,0.9);border-bottom:1px solid var(--border);backdrop-filter:blur(20px);display:flex;gap:8px;overflow-x:auto;}
.filterbar::-webkit-scrollbar{height:0;}
.ftag{padding:7px clamp(12px,3vw,18px);background:rgba(13,32,64,.5);border:1px solid var(--border);border-radius:40px;font-size:clamp(11px,2.5vw,12px);font-weight:500;color:var(--dim);cursor:pointer;transition:all .3s;white-space:nowrap;flex-shrink:0;}
.ftag:hover,.ftag.on{background:rgba(93,173,226,.12);border-color:rgba(93,173,226,.4);color:var(--azure);}

/* MAP */
#map{position:fixed;top:clamp(102px,16vw,118px);left:0;right:0;bottom:0;z-index:100;}

/* Leaflet dark tiles override */
.leaflet-tile-pane{filter:brightness(.8) saturate(.9) hue-rotate(180deg) invert(1);}
.leaflet-container{background:#060e1a;}

/* Custom marker */
.bz-marker{width:36px;height:44px;position:relative;cursor:pointer;}
.bz-marker-inner{width:36px;height:36px;border-radius:50% 50% 50% 0;background:linear-gradient(135deg,var(--azure),var(--blue));transform:rotate(-45deg);box-shadow:0 4px 20px rgba(93,173,226,.5);display:flex;align-items:center;justify-content:center;border:2px solid rgba(255,255,255,.3);transition:all .3s;}
.bz-marker-inner:hover{transform:rotate(-45deg) scale(1.15);}
.bz-marker-ico{transform:rotate(45deg);font-size:16px;}
.bz-marker-shadow{width:12px;height:6px;background:rgba(0,0,0,.3);border-radius:50%;margin:2px auto 0;filter:blur(3px);}
/* Verified marker */
.bz-marker.verified .bz-marker-inner{background:linear-gradient(135deg,var(--green),#27ae60);border-color:rgba(255,255,255,.4);}

/* POPUP */
.leaflet-popup-content-wrapper{background:var(--glass2)!important;border:1px solid var(--border2)!important;border-radius:var(--r2)!important;box-shadow:0 20px 60px rgba(0,0,0,.5)!important;padding:0!important;}
.leaflet-popup-content{margin:0!important;width:260px!important;}
.leaflet-popup-tip-container{display:none;}
.leaflet-popup-close-button{color:var(--dim)!important;font-size:16px!important;padding:10px!important;right:4px!important;top:4px!important;}
.leaflet-popup-close-button:hover{color:var(--white)!important;}
.popup-card{padding:16px;}
.popup-img{height:130px;border-radius:var(--r) var(--r) 0 0;overflow:hidden;background:linear-gradient(135deg,var(--bg3),#0d2d5e);display:flex;align-items:center;justify-content:center;font-size:40px;margin:-0px;}
.popup-img img{width:100%;height:100%;object-fit:cover;}
.popup-vrf{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;background:rgba(46,204,113,.15);border:1px solid rgba(46,204,113,.4);border-radius:20px;font-size:9px;font-weight:700;color:var(--green);margin-bottom:8px;}
.popup-name{font-family:'Cormorant Garamond',serif;font-size:17px;font-weight:700;color:var(--white);line-height:1.2;margin-bottom:4px;}
.popup-loc{font-size:11px;color:var(--dim);margin-bottom:10px;display:flex;align-items:center;gap:4px;}
.popup-tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px;}
.popup-tag{font-size:9.5px;padding:2px 7px;background:rgba(93,173,226,.08);border:1px solid rgba(93,173,226,.15);border-radius:20px;color:var(--dim);}
.popup-price-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.popup-price{font-size:18px;font-weight:700;color:var(--white);}
.popup-price-sub{font-size:10px;color:var(--dim);}
.popup-disc{display:inline-flex;align-items:center;gap:3px;padding:3px 8px;background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.3);border-radius:20px;font-size:9px;font-weight:700;color:var(--green);}
.popup-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.popup-btn{padding:9px 12px;border:none;border-radius:var(--r);font-size:12px;font-weight:700;cursor:pointer;transition:all .3s;text-align:center;}
.popup-btn-main{background:linear-gradient(135deg,var(--azure),var(--blue));color:#fff;}
.popup-btn-main:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(93,173,226,.3);}
.popup-btn-gps{background:rgba(13,32,64,.6);border:1px solid var(--border);color:var(--azure);}
.popup-btn-gps:hover{background:rgba(93,173,226,.1);}

/* HOTEL LIST PANEL */
.hotel-panel{position:fixed;right:0;top:clamp(102px,16vw,118px);bottom:0;width:clamp(260px,30vw,320px);background:var(--glass2);border-left:1px solid var(--border);z-index:500;display:flex;flex-direction:column;transform:translateX(0);transition:transform .3s;}
.hotel-panel.hidden{transform:translateX(100%);}
.panel-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.panel-title{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--white);}
.panel-title span{color:var(--azure);font-style:italic;}
.panel-toggle{width:28px;height:28px;border:1px solid var(--border);border-radius:var(--r);background:rgba(13,32,64,.5);color:var(--dim);font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.panel-search{padding:10px 14px;border-bottom:1px solid var(--border);}
.panel-search input{background:rgba(13,32,64,.6);border:1px solid var(--border);border-radius:var(--r);color:var(--white);padding:8px 12px;font-size:12px;outline:none;width:100%;transition:all .3s;}
.panel-search input:focus{border-color:rgba(93,173,226,.5);}
.panel-search input::placeholder{color:rgba(220,240,255,.25);}
.hotels-list-panel{flex:1;overflow-y:auto;padding:10px 12px;}
.hotels-list-panel::-webkit-scrollbar{width:0;}
.hotel-list-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--r);cursor:pointer;transition:all .3s;margin-bottom:6px;border:1px solid transparent;}
.hotel-list-item:hover{background:rgba(93,173,226,.08);border-color:rgba(93,173,226,.2);}
.hotel-list-item.active{background:rgba(93,173,226,.12);border-color:rgba(93,173,226,.35);}
.hli-emoji{font-size:22px;flex-shrink:0;}
.hli-info{flex:1;min-width:0;}
.hli-name{font-size:13px;font-weight:600;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hli-loc{font-size:10px;color:var(--dim);margin-top:1px;}
.hli-price{font-size:13px;font-weight:700;color:var(--azure);flex-shrink:0;}

/* TOGGLE PANEL BTN (mobile) */
.toggle-panel-btn{position:fixed;right:16px;top:calc(clamp(102px,16vw,118px) + 16px);z-index:600;width:40px;height:40px;background:var(--glass2);border:1px solid var(--border2);border-radius:var(--r);color:var(--azure);font-size:16px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(0,0,0,.4);}

/* Loading */
.map-loading{position:fixed;inset:0;top:clamp(102px,16vw,118px);background:rgba(6,14,26,.8);z-index:900;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;backdrop-filter:blur(6px);}
.loading-spinner{width:44px;height:44px;border:3px solid rgba(93,173,226,.2);border-top-color:var(--azure);border-radius:50%;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:14px;color:var(--dim);}

/* Empty state */
.map-empty{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:800;text-align:center;color:var(--dim);display:none;}
.map-empty-icon{font-size:56px;margin-bottom:14px;}
.map-empty-txt{font-size:14px;}

/* Toast */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(13,32,64,.97);border:1px solid rgba(93,173,226,.38);border-radius:var(--r);padding:11px 20px;color:var(--white);font-size:13px;z-index:2000;opacity:0;pointer-events:none;transition:all .35s cubic-bezier(.16,1,.3,1);backdrop-filter:blur(18px);box-shadow:0 12px 40px rgba(0,0,0,.4);white-space:nowrap;max-width:88vw;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

@media(max-width:768px){
  .hotel-panel{width:100%;transform:translateY(100%);top:auto;bottom:0;height:55vh;border-left:none;border-top:1px solid var(--border);border-radius:var(--r3) var(--r3) 0 0;}
  .hotel-panel.hidden{transform:translateY(100%);}
  .hotel-panel.visible{transform:translateY(0);}
  #map{bottom:0;}
  .toggle-panel-btn{display:flex;}
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <button class="back-btn" onclick="goBack()">← <span id="backTxt">Retour</span></button>
  <div class="topbar-logo">Book<span>Zzz</span></div>
  <div class="topbar-right">
    <div class="hotel-count"><strong id="hotelCountNum">0</strong> <span id="hotelCountTxt">hôtels</span></div>
  </div>
</div>

<!-- FILTER BAR -->
<div class="filterbar">
  <span class="ftag on" onclick="setFilter(this,'all')" id="f-all">🏨 Tous</span>
  <span class="ftag" onclick="setFilter(this,'verified')" id="f-verified">✅ Vérifiés</span>
  <span class="ftag" onclick="setFilter(this,'ac')" id="f-ac">❄️ Climatisé</span>
  <span class="ftag" onclick="setFilter(this,'meal')" id="f-meal">🍽️ Repas inclus</span>
  <span class="ftag" onclick="setFilter(this,'elevator')" id="f-elevator">🛗 Ascenseur</span>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- HOTEL LIST PANEL -->
<div class="hotel-panel" id="hotelPanel">
  <div class="panel-head">
    <div class="panel-title">Hôtels <span>disponibles</span></div>
    <button class="panel-toggle" onclick="togglePanel()">✕</button>
  </div>
  <div class="panel-search">
    <input id="panelSearch" placeholder="🔍 Rechercher..." oninput="filterPanel(this.value)">
  </div>
  <div class="hotels-list-panel" id="hotelsListPanel"></div>
</div>

<!-- MOBILE TOGGLE -->
<button class="toggle-panel-btn" id="toggleBtn" onclick="togglePanel()">📋</button>

<!-- LOADING -->
<div class="map-loading" id="mapLoading">
  <div class="loading-spinner"></div>
  <div class="loading-txt" id="loadingTxt">Chargement des hôtels...</div>
</div>

<!-- EMPTY -->
<div class="map-empty" id="mapEmpty">
  <div class="map-empty-icon">🗺️</div>
  <div class="map-empty-txt" id="emptyTxt">Aucun hôtel trouvé dans cette zone</div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ══ CONFIG ══ */
var SB='https://dgxgpvxyrimpppjvvwto.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRneGdwdnh5cmltcHBwanZ2d3RvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDc1NTMsImV4cCI6MjA4OTQyMzU1M30.Ccr7orHXHiVJJiXzdxIcF0bP9Kkj3PxQM-hZQQ4Mg2w';
var HDR={'apikey':SK,'Authorization':'Bearer '+SK};
var BASE='https://jasonyang0119-art.github.io/bookzzz/';
var DEFAULT_COMMISSION=25;
var DEFAULT_DISCOUNT=33;

/* ══ STATE ══ */
var G={
  hotels:[],filtered:[],markers:[],map:null,
  lang:localStorage.getItem('bz_lang')||'fr',
  city:localStorage.getItem('bz_city')||'Kinshasa',
  country:localStorage.getItem('bz_country')||'CD',
  activeFilter:'all',panelOpen:true,
  activeMarker:null
};

/* ══ TRANSLATIONS ══ */
var T={
  fr:{back:'Retour',hotels:'hôtels',loading:'Chargement des hôtels...',empty:'Aucun hôtel trouvé dans cette zone',
    verified:'Vérifié',rooms:'chambres',perNight:'/ nuit',viewHotel:'Voir & Réserver',openGPS:'GPS',
    discountLabel:'Réduction de ',f_all:'🏨 Tous',f_vrf:'✅ Vérifiés',f_ac:'❄️ Climatisé',f_meal:'🍽️ Repas inclus',f_elev:'🛗 Ascenseur',
    ac:'Clim.',elev:'Ascenseur',meal:'Repas',panelTitle:'Hôtels disponibles'},
  en:{back:'Back',hotels:'hotels',loading:'Loading hotels...',empty:'No hotels found in this area',
    verified:'Verified',rooms:'rooms',perNight:'/ night',viewHotel:'See & Book',openGPS:'GPS',
    discountLabel:'Discount ',f_all:'🏨 All',f_vrf:'✅ Verified',f_ac:'❄️ AC',f_meal:'🍽️ Meal incl.',f_elev:'🛗 Elevator',
    ac:'AC',elev:'Elevator',meal:'Meal',panelTitle:'Available Hotels'},
  sw:{back:'Rudi',hotels:'mahoteli',loading:'Inapakia mahoteli...',empty:'Hakuna mahoteli katika eneo hili',
    verified:'Imethibitishwa',rooms:'vyumba',perNight:'/ usiku',viewHotel:'Ona & Hifadhi',openGPS:'GPS',
    discountLabel:'Punguzo la ',f_all:'🏨 Yote',f_vrf:'✅ Imethibitishwa',f_ac:'❄️ AC',f_meal:'🍽️ Chakula',f_elev:'🛗 Lifti',
    ac:'AC',elev:'Lifti',meal:'Chakula',panelTitle:'Mahoteli Yanayopatikana'}
};

/* ══ DEMO HOTELS with coordinates ══ */
var DEMO_HOTELS=[
  {id:'d1',name:'Azure Sky Hotel',address:'Avenue Kasa-Vubu',city:'Kinshasa',country:'RDC',latitude:-4.3217,longitude:15.3222,is_verified:true,has_ac:true,has_elevator:true,meal_included:'breakfast',commission_rate:25,discount_rate:33,emoji:'🏙️',rooms_available:3,min_price:45000,currency:'CDF',status:'active'},
  {id:'d2',name:'Le Palmier Palace',address:'Bvd du 30 Juin',city:'Kinshasa',country:'RDC',latitude:-4.3148,longitude:15.3062,is_verified:true,has_ac:true,has_elevator:false,meal_included:'none',commission_rate:25,discount_rate:33,emoji:'🌴',rooms_available:5,min_price:32000,currency:'CDF',status:'active'},
  {id:'d3',name:'Nuit Tranquille',address:'Rue Kabambare',city:'Kinshasa',country:'RDC',latitude:-4.3356,longitude:15.3089,is_verified:false,has_ac:false,has_elevator:false,meal_included:'none',commission_rate:25,discount_rate:33,emoji:'🌙',rooms_available:8,min_price:18000,currency:'CDF',status:'active'},
  {id:'d4',name:'Grand Savana Resort',address:"Route de N'Sele",city:'Kinshasa',country:'RDC',latitude:-4.3897,longitude:15.4231,is_verified:true,has_ac:true,has_elevator:true,meal_included:'full',commission_rate:25,discount_rate:33,emoji:'🌿',rooms_available:2,min_price:78000,currency:'CDF',status:'active'},
  {id:'d5',name:'City Rest Inn',address:'Avenue Colonel Lukusa',city:'Kinshasa',country:'RDC',latitude:-4.3276,longitude:15.3178,is_verified:false,has_ac:true,has_elevator:false,meal_included:'none',commission_rate:25,discount_rate:33,emoji:'🏢',rooms_available:12,min_price:12000,currency:'CDF',status:'active'}
];

/* ══ INIT ══ */
window.addEventListener('DOMContentLoaded',function(){
  var t=T[G.lang]||T.fr;
  applyTranslations(t);
  initMap();
  loadHotels();
});

function applyTranslations(t){
  document.getElementById('backTxt').textContent=t.back;
  document.getElementById('hotelCountTxt').textContent=t.hotels;
  document.getElementById('loadingTxt').textContent=t.loading;
  document.getElementById('emptyTxt').textContent=t.empty;
  document.getElementById('f-all').textContent=t.f_all;
  document.getElementById('f-verified').textContent=t.f_vrf;
  document.getElementById('f-ac').textContent=t.f_ac;
  document.getElementById('f-meal').textContent=t.f_meal;
  document.getElementById('f-elevator').textContent=t.f_elev;
}

/* ══ INIT MAP ══ */
function initMap(){
  /* Default center: Kinshasa */
  var centers={
    'Kinshasa':[-4.3217,15.3222,12],
    'Goma':[-1.6832,29.2085,13],
    'Lubumbashi':[-11.6647,27.4794,13],
    'Dar es Salaam':[-6.7924,39.2083,12],
    'Dodoma':[-6.1722,35.7395,13]
  };
  var center=centers[G.city]||[-4.3217,15.3222,12];

  G.map=L.map('map',{
    center:[center[0],center[1]],
    zoom:center[2],
    zoomControl:false,
    attributionControl:true
  });

  /* Dark OpenStreetMap tiles */
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{
    attribution:'© <a href="https://www.openstreetmap.org/copyright">OSM</a> © <a href="https://carto.com/">CARTO</a>',
    subdomains:'abcd',
    maxZoom:19
  }).addTo(G.map);

  /* Zoom control bottom right */
  L.control.zoom({position:'bottomright'}).addTo(G.map);

  /* Attribution styling */
  document.querySelector('.leaflet-control-attribution').style.cssText='background:rgba(6,14,26,.8);color:rgba(220,240,255,.4);font-size:9px;border-radius:8px 0 0 0;';
}

/* ══ LOAD HOTELS ══ */
function loadHotels(){
  document.getElementById('mapLoading').style.display='flex';
  document.getElementById('mapEmpty').style.display='none';

  var url=SB+'/rest/v1/hotels?select=*&status=eq.active&order=created_at.desc';
  if(G.city){url+='&city=eq.'+encodeURIComponent(G.city);}

  fetch(url,{headers:HDR})
  .then(function(r){return r.json();})
  .then(function(d){
    document.getElementById('mapLoading').style.display='none';
    var hotels=d&&Array.isArray(d)&&d.length>0?d:DEMO_HOTELS;
    G.hotels=hotels;
    G.filtered=hotels;
    /* Enrich with min price from rooms */
    enrichPrices(hotels);
  })
  .catch(function(){
    document.getElementById('mapLoading').style.display='none';
    G.hotels=DEMO_HOTELS;G.filtered=DEMO_HOTELS;
    renderAll(DEMO_HOTELS);
  });
}

function enrichPrices(hotels){
  var ids=hotels.map(function(h){return h.id;}).join(',');
  fetch(SB+'/rest/v1/rooms?select=hotel_id,price,available&hotel_id=in.('+ids+')',{headers:HDR})
  .then(function(r){return r.json();})
  .then(function(rooms){
    if(rooms&&Array.isArray(rooms)){
      var pm={};
      rooms.forEach(function(r){
        if(!pm[r.hotel_id]){pm[r.hotel_id]={min:Infinity,count:0};}
        if(r.available!==false){if(r.price<pm[r.hotel_id].min)pm[r.hotel_id].min=r.price;pm[r.hotel_id].count++;}
      });
      hotels.forEach(function(h){
        if(pm[h.id]){h.min_price=pm[h.id].min===Infinity?0:pm[h.id].min;h.rooms_available=pm[h.id].count;}
        else{h.min_price=h.min_price||0;h.rooms_available=h.rooms_available||0;}
      });
    }
    renderAll(hotels);
  }).catch(function(){renderAll(hotels);});
}

/* ══ RENDER ALL ══ */
function renderAll(hotels){
  clearMarkers();
  var valid=hotels.filter(function(h){return h.latitude&&h.longitude;});
  /* If no coords in real data, use demo coords */
  if(valid.length===0){
    hotels.forEach(function(h,i){if(!h.latitude){var d=DEMO_HOTELS[i%DEMO_HOTELS.length];h.latitude=d.latitude+(Math.random()-.5)*.01;h.longitude=d.longitude+(Math.random()-.5)*.01;}});
    valid=hotels;
  }
  valid.forEach(function(h){addMarker(h);});
  renderPanel(valid);
  document.getElementById('hotelCountNum').textContent=valid.length;
  if(valid.length>0){
    /* Fit map to markers */
    var group=L.featureGroup(G.markers.map(function(m){return m.marker;}));
    if(G.markers.length>1)G.map.fitBounds(group.getBounds().pad(.15));
    else if(G.markers.length===1)G.map.setView([valid[0].latitude,valid[0].longitude],14);
    document.getElementById('mapEmpty').style.display='none';
  } else {
    document.getElementById('mapEmpty').style.display='block';
  }
}

/* ══ ADD MARKER ══ */
function addMarker(h){
  var t=T[G.lang]||T.fr;
  var isVerified=h.is_verified;
  /* Custom icon HTML */
  var iconHtml='<div class="bz-marker'+(isVerified?' verified':'')+'"><div class="bz-marker-inner"><div class="bz-marker-ico">'+(h.emoji||'🏨')+'</div></div><div class="bz-marker-shadow"></div></div>';
  var icon=L.divIcon({html:iconHtml,className:'',iconSize:[36,44],iconAnchor:[18,44],popupAnchor:[0,-44]});
  var marker=L.marker([h.latitude,h.longitude],{icon:icon});

  /* Popup content */
  var price=parseFloat(h.min_price||0);
  var comm=h.commission_rate||DEFAULT_COMMISSION;
  var disc=h.discount_rate||DEFAULT_DISCOUNT;
  var discPct=Math.round((comm/100)*(disc/100)*1000)/10;
  var amen='';
  if(h.has_ac)amen+='<span class="popup-tag">❄️ '+t.ac+'</span>';
  if(h.has_elevator)amen+='<span class="popup-tag">🛗 '+t.elev+'</span>';
  if(h.meal_included&&h.meal_included!=='none')amen+='<span class="popup-tag">🍽️ '+t.meal+'</span>';
  var gpsUrl='https://www.google.com/maps/search/?api=1&query='+h.latitude+','+h.longitude;
  var hotelUrl=BASE+'hotel.html?id='+h.id;

  var popupHtml='<div>'
    +'<div class="popup-img">'+(h.main_photo_url?'<img src="'+h.main_photo_url+'" alt="'+h.name+'" loading="lazy">':'<span>'+(h.emoji||'🏨')+'</span>')+'</div>'
    +'<div class="popup-card">'
    +(isVerified?'<div class="popup-vrf">✓ '+t.verified+'</div>':'')
    +'<div class="popup-name">'+h.name+'</div>'
    +'<div class="popup-loc">📍 '+(h.address||'')+(h.city?', '+h.city:'')+'</div>'
    +(amen?'<div class="popup-tags">'+amen+'</div>':'')
    +'<div class="popup-price-row">'
    +'<div><div class="popup-price">'+(price>0?price.toLocaleString()+' '+(h.currency||'CDF'):'—')+'</div><div class="popup-price-sub">'+(price>0?t.perNight:'')+'</div></div>'
    +(discPct>0&&price>0?'<div class="popup-disc">🎉 '+t.discountLabel+discPct+'%</div>':'')
    +'</div>'
    +'<div class="popup-btns">'
    +'<button class="popup-btn popup-btn-main" onclick="openHotel(\''+hotelUrl+'\',\''+h.id+'\')">'+t.viewHotel+'</button>'
    +'<a class="popup-btn popup-btn-gps" href="'+gpsUrl+'" target="_blank">🗺️ '+t.openGPS+'</a>'
    +'</div>'
    +'</div></div>';

  marker.bindPopup(popupHtml,{maxWidth:280,minWidth:260});
  marker.on('click',function(){
    G.activeMarker=h.id;
    highlightPanelItem(h.id);
    localStorage.setItem('bz_hotel',JSON.stringify(h));
  });
  marker.addTo(G.map);
  G.markers.push({id:h.id,marker:marker,hotel:h});
}

/* ══ OPEN HOTEL ══ */
function openHotel(url,id){
  var h=G.hotels.find(function(x){return x.id==id;});
  if(h){localStorage.setItem('bz_hotel',JSON.stringify(h));localStorage.setItem('bz_lang',G.lang);}
  window.location.href=url;
}

/* ══ CLEAR MARKERS ══ */
function clearMarkers(){
  G.markers.forEach(function(m){G.map.removeLayer(m.marker);});
  G.markers=[];
}

/* ══ RENDER PANEL ══ */
function renderPanel(hotels){
  var t=T[G.lang]||T.fr;
  var list=document.getElementById('hotelsListPanel');
  if(!hotels.length){list.innerHTML='<div style="text-align:center;padding:40px 20px;color:var(--dim)">Aucun hôtel</div>';return;}
  list.innerHTML=hotels.map(function(h){
    var price=parseFloat(h.min_price||0);
    return '<div class="hotel-list-item" id="hli-'+h.id+'" onclick="focusHotel(\''+h.id+'\')">'
      +'<div class="hli-emoji">'+(h.emoji||'🏨')+'</div>'
      +'<div class="hli-info"><div class="hli-name">'+h.name+'</div><div class="hli-loc">📍 '+(h.city||'')+'</div></div>'
      +'<div class="hli-price">'+(price>0?price.toLocaleString()+'<br><span style="font-size:9px;color:var(--dim)">'+t.perNight+'</span>':'—')+'</div>'
      +'</div>';
  }).join('');
}

/* ══ FOCUS HOTEL ══ */
function focusHotel(id){
  var m=G.markers.find(function(x){return x.id==id;});
  if(!m)return;
  G.map.setView([m.hotel.latitude,m.hotel.longitude],15,{animate:true});
  setTimeout(function(){m.marker.openPopup();},400);
  G.activeMarker=id;
  highlightPanelItem(id);
  localStorage.setItem('bz_hotel',JSON.stringify(m.hotel));
  /* On mobile: close panel to show map */
  if(window.innerWidth<=768){
    var panel=document.getElementById('hotelPanel');panel.classList.remove('visible');
  }
}

function highlightPanelItem(id){
  document.querySelectorAll('.hotel-list-item').forEach(function(el){el.classList.remove('active');});
  var el=document.getElementById('hli-'+id);if(el)el.classList.add('active');
}

/* ══ FILTER ══ */
function setFilter(el,type){
  G.activeFilter=type;
  document.querySelectorAll('.ftag').forEach(function(x){x.classList.remove('on');});
  el.classList.add('on');
  var filtered=G.hotels.filter(function(h){
    return type==='all'
      ||(type==='verified'&&h.is_verified)
      ||(type==='ac'&&h.has_ac)
      ||(type==='meal'&&h.meal_included&&h.meal_included!=='none')
      ||(type==='elevator'&&h.has_elevator);
  });
  G.filtered=filtered;
  renderAll(filtered);
}

function filterPanel(q){
  q=q.toLowerCase().trim();
  var filtered=G.filtered.filter(function(h){return !q||h.name.toLowerCase().includes(q)||(h.city||'').toLowerCase().includes(q)||(h.address||'').toLowerCase().includes(q);});
  renderPanel(filtered);
  clearMarkers();filtered.forEach(function(h){addMarker(h);});
  document.getElementById('hotelCountNum').textContent=filtered.length;
}

/* ══ TOGGLE PANEL ══ */
function togglePanel(){
  var panel=document.getElementById('hotelPanel');
  var btn=document.getElementById('toggleBtn');
  if(window.innerWidth<=768){
    panel.classList.toggle('visible');
    btn.textContent=panel.classList.contains('visible')?'🗺️':'📋';
  } else {
    panel.classList.toggle('hidden');
    G.map.invalidateSize();
  }
}

/* ══ BACK ══ */
function goBack(){
  window.location.href=BASE+'index.html';
}

/* ══ TOAST ══ */
var tT;
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');clearTimeout(tT);tT=setTimeout(function(){t.classList.remove('show');},3000);}
</script>
</body>
